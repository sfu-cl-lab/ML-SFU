- date: "2026-05-23"
  shortname: "aicrv-2026"
  title: "SFU organizing Canadian AI/CRV 2026"
  venue: "aicrv"
  year: 2026
  type: conference
  html: SFU is hosting the 2026 Canadian Conference on Artificial Intelligence, Robots & Vision (AI/CRV) in Vancouver.  The conference will be held at the SFU Burnaby campus from May 25th to May 29th.  We have a packed schedule with 9 workshops in addition to the two conferences.  We are looking forward to welcoming researchers from across Canada to our beautiful city for this exciting event! See <a href='https://www.sfu.ca/fas/computing/news-events/news/2026/may/advancing-artificial-intelligence-and-vision-research--sfu-compu.html'>SFU news</a> and <a href='https://www.ai-crv.ca/'>https://www.ai-crv.ca/</a> for more details.

